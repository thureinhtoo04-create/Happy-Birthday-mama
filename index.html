<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mama! 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="confetti" id="confetti"></div>
        
        <div class="content">
            <h1 class="birthday-title">Happy Birthday</h1>
            <h2 class="mama-text">Mama! 🎂</h2>
            
            <div class="balloons">
                <div class="balloon red"></div>
                <div class="balloon blue"></div>
                <div class="balloon yellow"></div>
                <div class="balloon green"></div>
                <div class="balloon purple"></div>
            </div>
            
            <div class="card">
                <p class="message">
                    Wishing you the most wonderful birthday filled with love, laughter, and cherished moments!
                </p>
                <p class="message-secondary">
                    Thank you for all the love, care, and support you've given us. You are truly special! 💕
                </p>
            </div>
            
            <button class="surprise-btn" onclick="triggerSurprise()">🎊 Click for Surprise! 🎊</button>
            
            <div class="cake">
                <div class="candle"></div>
                <div class="flame"></div>
                <div class="cake-body">🎂</div>
            </div>
            
            <div class="hearts" id="hearts"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
